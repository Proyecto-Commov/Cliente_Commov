<!DOCTYPE html>
<html>
<head>
    <title>Commov Live Stream</title>
    <script src="https://cdn.jsdelivr.net/npm/jmuxer@2.0.5/dist/jmuxer.min.js"></script>
    <style>
        body {
            background: #222;
            color: white;
            text-align: center;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
        }
        #player {
            width: 80%;
            max-width: 1200px;
            border: 2px solid #444;
            background: #000;
            margin: 20px auto;
            display: block;
        }
        #status {
            margin-top: 20px;
            font-size: 14px;
            color: #888;
        }
        .connected {
            color: #0f0;
        }
        .disconnected {
            color: #f00;
        }
    </style>
</head>
<body>
    <h1>Streaming en Directo</h1>
    <video id="player" autoplay muted></video>
    <div id="status" class="disconnected">Desconectado...</div>

    <script>
        const videoElement = document.getElementById('player');
        const statusElement = document.getElementById('status');
        
        // Configurar JMuxer para reproducir H.264 raw bitstream - ULTRA LOW LATENCY
        const jmuxer = new JMuxer({
            node: videoElement,
            mode: 'video',
            flushingTime: 50,  // Mínimo para flush rápido (casi sin buffering)
            fps: 30,
            debug: false,
            buffer: 5  // Absolutamente mínimo para latencia ultra baja
        });

        // Buffer temporal para acumular datos H.264
        let videoBuffer = new Uint8Array();

        // Conectar al WebSocket
        const socket = new WebSocket('ws://' + window.location.host + '/video');
        socket.binaryType = 'arraybuffer';

        socket.onopen = function(event) {
            statusElement.textContent = 'Conectado - Esperando video...';
            statusElement.className = 'connected';
        };

        socket.onmessage = function(event) {
            try {
                // Obtener datos H.264 del WebSocket
                const newData = new Uint8Array(event.data);
                
                // Acumular datos en el buffer
                const combined = new Uint8Array(videoBuffer.length + newData.length);
                combined.set(videoBuffer);
                combined.set(newData, videoBuffer.length);
                videoBuffer = combined;
                
                // Enviar datos a JMuxer INMEDIATAMENTE cuando haya datos
                // Esto reduce el lag al máximo - casi latencia en vivo
                if (videoBuffer.length > 0) {
                    jmuxer.feed({
                        video: videoBuffer
                    });
                    videoBuffer = new Uint8Array();  // Limpiar buffer completamente
                }
                
                statusElement.textContent = 'Reproduciendo en vivo (latencia ultra-baja)...';
                statusElement.className = 'connected';
                
            } catch (e) {
                console.error('Error procesando video:', e);
                statusElement.textContent = 'Error: ' + e.message;
                statusElement.className = 'disconnected';
            }
        };

        socket.onerror = function(event) {
            statusElement.textContent = 'Error de conexión WebSocket';
            statusElement.className = 'disconnected';
            console.error('WebSocket error:', event);
        };

        socket.onclose = function(event) {
            statusElement.textContent = 'Desconectado';
            statusElement.className = 'disconnected';
        };
    </script>
</body>
</html>
